version: "3.8"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: resume_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: resume_password
      MYSQL_DATABASE: resume_builder
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # phpMyAdmin (Database Management UI)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: resume_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: resume_password
    depends_on:
      mysql:
        condition: service_healthy

  # Backend API (Node.js + Express)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:resume_password@mysql:3306/resume_builder
      NODE_ENV: development
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  uploads_data:
