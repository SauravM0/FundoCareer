[versions]
agp = "8.9.1"
coreKtx = "1.15.0"
junit = "4.13.2"
junitVersion = "1.2.1"
espressoCore = "3.6.1"
appcompat = "1.7.0"
material = "1.12.0"
activity = "1.9.3"
webkit = "1.12.1"
splashscreen = "1.2.0"
securityCrypto = "1.1.0-alpha06"
playServicesAuth = "21.2.0"
capacitor = "6.1.0"
capacitorApp = "6.0.2"
capacitorSplash = "6.0.3"
browser = "1.8.0"
